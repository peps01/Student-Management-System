<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Student Management System</title>
  <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>SMS</span>
    </div>
    <nav class="sidebar-nav" id="profileSidebar">
    </nav>
    <div class="sidebar-footer">
      <a href="/login">🚪 Logout</a>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger">☰</button>
      <span class="topbar-title">Profile</span>
    </div>
    <div class="topbar-right">
      <span class="user-name">Admin User</span>
      <button class="dark-mode-toggle btn btn-ghost btn-icon" style="font-size: 1.1rem;" title="Toggle dark mode">🌙</button>
      <div class="notification-bell">
        <span class="bell-icon">🔔</span>
        <span class="bell-badge">0</span>
        <div class="bell-dropdown"></div>
      </div>
      <div class="user-avatar" data-name="Admin User">A</div>
    </div>
  </header>

  <main class="main-content">
    <div class="breadcrumb"><a href="/dashboard">Dashboard</a><span class="sep">/</span>Profile</div>
    <div class="page-header">
      <h1>Profile</h1>
    </div>
    <div id="profileInfo"></div>

    <div class="card profile-section">
      <h3>Edit Profile</h3>
      <form id="editProfileForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label for="pName">Full Name</label>
            <input type="text" id="pName" name="name" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="pEmail">Email</label>
            <input type="email" id="pEmail" name="email" class="form-control" required>
          </div>
        </div>
        <div class="form-group">
          <label for="pBio">Bio</label>
          <textarea id="pBio" name="bio" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>

    <div class="card profile-section">
      <h3>Change Password</h3>
      <form id="changePasswordForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" name="currentPassword" class="form-control" placeholder="Enter current password" required>
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="Enter new password" required>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
      </form>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/script.js"></script>
</body>
</html>
