<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - Student Management System</title>
  <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>SMS</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/students"><span class="nav-icon">👥</span> Students</a>
      <a href="/grades"><span class="nav-icon">📝</span> Grades</a>
      <a href="/attendance"><span class="nav-icon">📋</span> Attendance</a>
      <a href="/announcements"><span class="nav-icon">📢</span> Announcements</a>
      <div class="nav-section">Account</div>
      <a href="/profile"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/login">🚪 Logout</a>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger">☰</button>
      <span class="topbar-title">Students</span>
    </div>
    <div class="topbar-right">
      <span class="user-name">Admin User</span>
      <button class="dark-mode-toggle btn btn-ghost btn-icon" style="font-size: 1.1rem;" title="Toggle dark mode">🌙</button>
      <div class="notification-bell">
        <span class="bell-icon">🔔</span>
        <span class="bell-badge">0</span>
        <div class="bell-dropdown"></div>
      </div>
      <div class="user-avatar" data-name="Admin User">A</div>
    </div>
  </header>

  <main class="main-content">
    <div class="breadcrumb"><a href="/dashboard">Dashboard</a><span class="sep">/</span>Students</div>
    <div class="page-header">
      <h1>Students</h1>
      <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="studentSearch" placeholder="Search students...">
        </div>
        <button class="btn btn-primary" onclick="openModal('addStudentModal')">+ Add Student</button>
      </div>
    </div>

    <div class="card" style="padding: 4px;">
      <div class="table-container">
        <table id="studentsTable"></table>
      </div>
      <div id="paginationControls" class="pagination"></div>
    </div>
  </main>

  <!-- Add Student Modal -->
  <div class="modal-overlay" id="addStudentModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Student</h2>
        <button class="close-btn" onclick="closeModal('addStudentModal')">&times;</button>
      </div>
      <form id="addStudentForm">
        <div class="modal-body">
          <div class="form-group">
            <label for="addName">Full Name</label>
            <input type="text" id="addName" name="name" class="form-control" placeholder="Enter full name" required>
          </div>
          <div class="form-group">
            <label for="addEmail">Email</label>
            <input type="email" id="addEmail" name="email" class="form-control" placeholder="Enter email" required>
          </div>
          <div class="form-group">
            <label for="addCourse">Course</label>
            <select id="addCourse" name="course" class="form-control" required>
              <option value="">Select course</option>
              <option value="Computer Science">Computer Science</option>
              <option value="Mathematics">Mathematics</option>
              <option value="Physics">Physics</option>
              <option value="Engineering">Engineering</option>
              <option value="Biology">Biology</option>
            </select>
          </div>
          <div class="form-group">
            <label for="addYear">Year</label>
            <select id="addYear" name="year" class="form-control" required>
              <option value="">Select year</option>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
              <option value="5">5th Year</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('addStudentModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Student</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Student Modal -->
  <div class="modal-overlay" id="editStudentModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Student</h2>
        <button class="close-btn" onclick="closeModal('editStudentModal')">&times;</button>
      </div>
      <form id="editStudentForm">
        <div class="modal-body">
          <input type="hidden" id="editId" name="id">
          <div class="form-group">
            <label for="editName">Full Name</label>
            <input type="text" id="editName" name="name" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="editEmail">Email</label>
            <input type="email" id="editEmail" name="email" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="editCourse">Course</label>
            <select id="editCourse" name="course" class="form-control" required>
              <option value="Computer Science">Computer Science</option>
              <option value="Mathematics">Mathematics</option>
              <option value="Physics">Physics</option>
              <option value="Engineering">Engineering</option>
              <option value="Biology">Biology</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editYear">Year</label>
            <select id="editYear" name="year" class="form-control" required>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
              <option value="5">5th Year</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('editStudentModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/script.js"></script>
</body>
</html>
