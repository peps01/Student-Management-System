<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Attendance - Student Management System</title>
  <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🎓</div><span>SMS Faculty</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="/faculty/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/faculty/classes" class="active"><span class="nav-icon">📚</span> My Classes</a>
      <div class="nav-section">Account</div>
      <a href="/profile"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer"><a href="/login">🚪 Logout</a></div>
  </aside>
  <header class="topbar">
    <div class="topbar-left"><button class="hamburger">☰</button><span class="topbar-title">Mark Attendance</span></div>
    <div class="topbar-right">
      <span class="user-name">Faculty</span>
      <button class="dark-mode-toggle btn btn-ghost btn-icon" style="font-size:1.1rem;">🌙</button>
      <div class="notification-bell"><span class="bell-icon">🔔</span><span class="bell-badge">0</span><div class="bell-dropdown"></div></div>
      <div class="user-avatar" data-name="Faculty">F</div>
    </div>
  </header>
  <main class="main-content">
    <div class="breadcrumb"><a href="/faculty/dashboard">Dashboard</a><span class="sep">/</span><a href="/faculty/classes">Classes</a><span class="sep">/</span>Attendance</div>
    <div class="page-header"><h1 id="attClassTitle">Mark Attendance</h1></div>

    <div class="card" style="padding:20px;margin-bottom:20px;">
      <div style="display:flex;gap:16px;align-items:end;flex-wrap:wrap;">
        <div class="form-group" style="margin:0;">
          <label>Select Date</label>
          <input type="date" id="attDate" class="form-control">
        </div>
        <button class="btn btn-primary" onclick="loadAttendanceForDate()">Load Roster</button>
        <button class="btn btn-success" onclick="markAllPresent()">Mark All Present</button>
      </div>
    </div>

    <div class="card" style="padding:4px;">
      <div class="table-container"><table id="facultyAttTable"></table></div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/script.js"></script>
</body>
</html>
