<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Student Management System</title>
  <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🎓</div>
      <h2>Create Account</h2>
      <p class="login-sub">Register a new account</p>
      <div class="login-error"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Choose a password" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
      <p style="text-align:center;margin-top:16px;">
        <a href="/login" style="color:var(--primary);font-size:0.85rem;">Already have an account? Sign in</a>
      </p>
    </div>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/script.js"></script>
</body>
</html>
