<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grades - Student Management System</title>
  <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>SMS</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/students"><span class="nav-icon">👥</span> Students</a>
      <a href="/grades"><span class="nav-icon">📝</span> Grades</a>
      <a href="/attendance"><span class="nav-icon">📋</span> Attendance</a>
      <a href="/announcements"><span class="nav-icon">📢</span> Announcements</a>
      <div class="nav-section">Account</div>
      <a href="/profile"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/login">🚪 Logout</a>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger">☰</button>
      <span class="topbar-title">Grades</span>
    </div>
    <div class="topbar-right">
      <span class="user-name">Admin User</span>
      <button class="dark-mode-toggle btn btn-ghost btn-icon" style="font-size: 1.1rem;" title="Toggle dark mode">🌙</button>
      <div class="notification-bell">
        <span class="bell-icon">🔔</span>
        <span class="bell-badge">0</span>
        <div class="bell-dropdown"></div>
      </div>
      <div class="user-avatar" data-name="Admin User">A</div>
    </div>
  </header>

  <main class="main-content">
    <div class="breadcrumb"><a href="/dashboard">Dashboard</a><span class="sep">/</span>Grades</div>
    <div class="page-header">
      <h1>Grades</h1>
      <p style="color: var(--text-muted);">Subject-based grading overview</p>
    </div>

    <div class="card" style="padding: 4px;">
      <div id="gradesContainer"></div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/script.js"></script>
</body>
</html>
