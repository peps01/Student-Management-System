<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Student Management System</title>
  <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🎓</div><span>SMS Student</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="/student/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/student/enrollment"><span class="nav-icon">📝</span> Enrollment</a>
      <a href="/student/grades"><span class="nav-icon">📊</span> My Grades</a>
      <a href="/student/attendance"><span class="nav-icon">📋</span> Attendance</a>
      <div class="nav-section">Account</div>
      <a href="/profile"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer"><a href="/login">🚪 Logout</a></div>
  </aside>
  <header class="topbar">
    <div class="topbar-left"><button class="hamburger">☰</button><span class="topbar-title">Student Dashboard</span></div>
    <div class="topbar-right">
      <span class="user-name" id="headerUserName">Student</span>
      <button class="dark-mode-toggle btn btn-ghost btn-icon" style="font-size:1.1rem;">🌙</button>
      <div class="notification-bell"><span class="bell-icon">🔔</span><span class="bell-badge">0</span><div class="bell-dropdown"></div></div>
      <div class="user-avatar" data-name="Student">S</div>
    </div>
  </header>
  <main class="main-content">
    <div class="breadcrumb">Student Dashboard</div>
    <div class="page-header"><h1>My Dashboard</h1><p style="color:var(--text-muted);">Academic performance overview</p></div>
    <div id="studentDashboardContent"></div>
  </main>
  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/script.js"></script>
</body>
</html>
