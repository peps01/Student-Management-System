<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements - Student Management System</title>
  <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode')}</script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <span>SMS</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/students"><span class="nav-icon">👥</span> Students</a>
      <a href="/grades"><span class="nav-icon">📝</span> Grades</a>
      <a href="/attendance"><span class="nav-icon">📋</span> Attendance</a>
      <a href="/announcements"><span class="nav-icon">📢</span> Announcements</a>
      <div class="nav-section">Account</div>
      <a href="/profile"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/login">🚪 Logout</a>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger">☰</button>
      <span class="topbar-title">Announcements</span>
    </div>
    <div class="topbar-right">
      <span class="user-name">Admin User</span>
      <button class="dark-mode-toggle btn btn-ghost btn-icon" style="font-size: 1.1rem;" title="Toggle dark mode">🌙</button>
      <div class="notification-bell">
        <span class="bell-icon">🔔</span>
        <span class="bell-badge">0</span>
        <div class="bell-dropdown"></div>
      </div>
      <div class="user-avatar" data-name="Admin User">A</div>
    </div>
  </header>

  <main class="main-content">
    <div class="breadcrumb"><a href="/dashboard">Dashboard</a><span class="sep">/</span>Announcements</div>
    <div class="page-header">
      <h1>Announcements</h1>
      <button class="btn btn-primary" onclick="openModal('addAnnouncementModal')">+ New Announcement</button>
    </div>

    <div id="announcementsList" class="announcements-list"></div>
  </main>

  <!-- Add Announcement Modal -->
  <div class="modal-overlay" id="addAnnouncementModal">
    <div class="modal">
      <div class="modal-header">
        <h2>New Announcement</h2>
        <button class="close-btn" onclick="closeModal('addAnnouncementModal')">&times;</button>
      </div>
      <form id="announcementForm">
        <div class="modal-body">
          <div class="form-group">
            <label for="anncTitle">Title</label>
            <input type="text" id="anncTitle" name="title" class="form-control" placeholder="Announcement title" required>
          </div>
          <div class="form-group">
            <label for="anncBody">Content</label>
            <textarea id="anncBody" name="body" class="form-control" placeholder="Write your announcement..." required></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('addAnnouncementModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Post Announcement</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/static/js/script.js"></script>
</body>
</html>
